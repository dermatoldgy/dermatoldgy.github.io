<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Дерматологія лікаря Солодовник</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Montserrat', sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f8fafb;
            color: #2c3e50;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .card {
            background: white;
            max-width: 500px;
            width: 90%;
            padding: 50px 40px;
            border-radius: 30px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.08);
            text-align: center;
            border-top: 6px solid #4a90e2;
        }
        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 28px;
            color: #1a2a3a;
            margin: 20px 0 10px;
            line-height: 1.2;
        }
        .specialty {
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 12px;
            color: #4a90e2;
            font-weight: 700;
        }
        .services {
            text-align: left;
            background: #fdfdfd;
            padding: 25px;
            border-radius: 20px;
            margin: 30px 0;
            border: 1px solid #edf2f7;
        }
        .service-item {
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            font-size: 15px;
        }
        .service-item:before {
            content: "✦";
            color: #4a90e2;
            margin-right: 10px;
            font-weight: bold;
        }
        .btn-contact {
            display: block;
            background: #1a2a3a;
            color: white;
            text-decoration: none;
            padding: 18px;
            border-radius: 15px;
            font-weight: bold;
            font-size: 16px;
            transition: all 0.3s ease;
        }
        .btn-contact:hover {
            background: #4a90e2;
            transform: translateY(-2px);
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="specialty">Приватна практика</div>
        <h1>Дерматологія<br>лікаря Солодовник</h1>
        
        <div class="services">
            <div class="service-item">Діагностика та лікування захворювань шкіри</div>
            <div class="service-item">Видалення новоутворень</div>
            <div class="service-item">Індивідуальні програми догляду</div>
            <div class="service-item">Консультація дорослих та дітей</div>
        </div>

        <a href="https://t.me/solodovnik_dr" class="btn-contact">Записатися на прийом</a>
        
        <p style="font-size: 13px; color: #95a5a6; margin-top: 25px;">м. Київ | Онлайн та офлайн прийом</p>
    </div>

</body>
</html>
