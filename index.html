<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dermatoldgy | Здорова шкіра</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Montserrat', sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f0f4f8; /* Легкий блакитний відтінок */
            color: #2d3436;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .card {
            background: white;
            max-width: 450px;
            width: 90%;
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            text-align: center;
        }
        .icon-circle {
            width: 80px;
            height: 80px;
            background: #e1f5fe;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            margin: 0 auto 20px;
        }
        h1 {
            margin: 0;
            font-size: 28px;
            color: #0288d1;
        }
        p.subtitle {
            color: #636e72;
            margin-top: 10px;
            font-size: 16px;
        }
        .services {
            text-align: left;
            background: #f9f9f9;
            padding: 20px;
            border-radius: 15px;
            margin: 25px 0;
        }
        .services-title {
            font-weight: bold;
            margin-bottom: 10px;
            display: block;
            color: #0288d1;
        }
        .btn-tg {
            display: block;
            background: #0088cc;
            color: white;
            text-decoration: none;
            padding: 15px;
            border-radius: 12px;
            font-weight: bold;
            transition: transform 0.2s;
        }
        .btn-tg:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(0,136,204,0.3);
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="icon-circle">🔬</div>
        <h1>Dermatoldgy</h1>
        <p class="subtitle">Твій шлях до здорової та сяючої шкіри</p>

        <div class="services">
            <span class="services-title">Чим я можу допомогти:</span>
            <div style="margin-bottom: 8px;">🔹 Індивідуальний підбір догляду</div>
            <div style="margin-bottom: 8px;">🔹 Консультації щодо стану шкіри</div>
            <div>🔹 Аналіз складу косметичних засобів</div>
        </div>

        <a href="https://t.me/твій_логін" target="_blank" class="btn-tg">Написати мені в Telegram</a>
        
        <p style="font-size: 12px; color: #b2bec3; margin-top: 20px;">© 2026 Dermatoldgy. Всі права захищені.</p>
    </div>

</body>
</html>
