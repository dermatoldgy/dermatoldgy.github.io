<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Дерматологія лікаря Солодовник</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Montserrat', sans-serif;
            margin: 0; padding: 0;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            color: #2c3e50;
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh;
        }
        .card {
            background: white;
            max-width: 480px; width: 90%;
            padding: 40px; border-radius: 40px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.12);
            text-align: center;
            position: relative;
        }
        /* Місце для фото */
        .profile-img {
            width: 120px; height: 120px;
            background: #e1f5fe;
            border-radius: 50%;
            margin: -80px auto 20px; /* Виносить фото трохи за межі картки */
            border: 5px solid white;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            overflow: hidden;
            display: flex; align-items: center; justify-content: center;
            font-size: 50px;
        }
        .profile-img img { width: 100%; height: 100%; object-fit: cover; }

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 26px; color: #1a2a3a;
            margin-bottom: 5px;
        }
        .subtitle { color: #4a90e2; font-weight: 600; font-size: 14px; text-transform: uppercase; letter-spacing: 1px; }
        
        .info-box {
            text-align: left; background: #f8f9fa;
            padding: 20px; border-radius: 20px; margin: 25px 0;
        }
        .info-item { margin-bottom: 10px; display: flex; align-items: center; font-size: 14px; }
        .info-item i { color: #4a90e2; margin-right: 10px; }

        .cta-buttons { display: flex; flex-direction: column; gap: 10px; }
        
        .btn {
            padding: 16px; border-radius: 15px; text-decoration: none;
            font-weight: 700; transition: 0.3s;
        }
        .btn-primary { background: #1a2a3a; color: white; }
        .btn-secondary { border: 2px solid #1a2a3a; color: #1a2a3a; }
        
        .btn:hover { transform: translateY(-3px); opacity: 0.9; }
    </style>
</head>
<body>

    <div class="card">
        <div class="profile-img">👩‍⚕️</div>
        
        <div class="subtitle">Приватна практика</div>
        <h1>Дерматологія<br>лікаря Солодовник</h1>
        
        <div class="info-box">
            <div class="info-item">📍 м. Київ, (вкажи район/вулицю)</div>
            <div class="info-item">⏰ Пн-Сб: 09:00 - 19:00</div>
            <div class="info-item">📞 +38 (0XX) XXX-XX-XX</div>
        </div>

        <div class="cta-buttons">
            <a href="https://t.me/твій_нік" class="btn btn-primary">Записатися через Telegram</a>
            <a href="tel:+380XXXXXXXXX" class="btn btn-secondary">Зателефонувати</a>
        </div>
        
        <p style="font-size: 11px; color: #bdc3c7; margin-top: 20px;">Турбота про вашу шкіру — моя професія</p>
    </div>

</body>
</html>
